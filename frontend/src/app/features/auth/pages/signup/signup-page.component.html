<section class="page-page signup-page">
  <div class="signup-container">
    <div class="signup-card">
      <h2>Create Account</h2>
      <p>Sign up to get started with your account.</p>
      
      <form [formGroup]="signupForm" (ngSubmit)="onSignup()" class="signup-form">
        <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            formControlName="name"
            placeholder="Enter your full name"
            class="form-input"
          />
          <span class="error-text" *ngIf="signupForm.get('name')?.hasError('required') && signupForm.get('name')?.touched">Name is required</span>
          <span class="error-text" *ngIf="signupForm.get('name')?.hasError('minlength') && signupForm.get('name')?.touched">Name must be at least 2 characters</span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="Enter your email"
            class="form-input"
          />
          <span class="error-text" *ngIf="signupForm.get('email')?.hasError('required') && signupForm.get('email')?.touched">Email is required</span>
          <span class="error-text" *ngIf="signupForm.get('email')?.hasError('email') && signupForm.get('email')?.touched">Invalid email format</span>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            class="form-input"
          />
          <span class="error-text" *ngIf="signupForm.get('password')?.hasError('required') && signupForm.get('password')?.touched">Password is required</span>
          <span class="error-text" *ngIf="signupForm.get('password')?.hasError('minlength') && signupForm.get('password')?.touched">Password must be at least 6 characters</span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            formControlName="confirmPassword"
            placeholder="Confirm your password"
            class="form-input"
            [class.input-error]="signupForm.hasError('passwordMismatch') && signupForm.get('confirmPassword')?.touched"
          />
          <span class="error-text" *ngIf="signupForm.get('confirmPassword')?.hasError('required') && signupForm.get('confirmPassword')?.touched">Confirm password is required</span>
          <span class="error-text" *ngIf="signupForm.hasError('passwordMismatch') && signupForm.get('confirmPassword')?.touched">Passwords do not match</span>
        </div>
        
        <button type="submit" class="btn btn-signup" [disabled]="signupForm.invalid">
          {{ isLoading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>
      
      <button type="button" class="btn btn-back-to-login" (click)="onBackToLogin()">Back to Login</button>
    </div>
  </div>
</section>
